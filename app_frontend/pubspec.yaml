name: app_frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.6

  # State Management
  provider: ^6.1.1

  # API
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2

  # Device Info
  device_info_plus: ^10.1.0

  # File
  path_provider: ^2.1.2
  open_file: ^3.3.2

  # Image
  image_picker: ^1.0.7

  # UI
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  file_picker: ^11.0.2
  url_launcher: ^6.3.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"

flutter_native_splash:
  color: "#FFFFFF" 
  image: "assets/images/logo.png"
  android: true
  ios: true